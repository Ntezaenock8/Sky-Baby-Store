services:
  - type: web
    name: sky-baby-store
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false        # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9      # stable version compatible with all dependencies
