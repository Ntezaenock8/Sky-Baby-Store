{% extends 'base.html' %}
{% block title %}Register — Sky Baby Store{% endblock %}

{% block content %}

<div class="auth-card">
    <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill display-5" style="color: var(--accent)"></i>
        <h3 class="fw-bold mt-2">Create Account</h3>
        <p class="text-muted small">Join Sky Baby Store today</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="john@email.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="position-relative">
                <input type="password" name="password" class="form-control pe-5" id="regPasswordInput" required>
                <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y border-0 text-muted" id="toggleRegPassword" style="cursor: pointer; padding: 0.375rem 0.75rem;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">
            Create Account
        </button>
    </form>

    <p class="text-center text-muted small mt-3">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
    </p>
</div>

<script>
// Password visibility toggle for register
document.getElementById('toggleRegPassword').addEventListener('click', function(e) {
    e.preventDefault();
    const input = document.getElementById('regPasswordInput');
    const icon = this.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
});
</script>

{% endblock %}
