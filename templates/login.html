{% extends 'base.html' %}
{% block title %}Login — Sky Baby Store{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <!-- Login Form -->
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-balloon-heart-fill display-5" style="color: var(--accent)"></i>
                <h3 class="fw-bold mt-2">Welcome Back</h3>
                <p class="text-muted small">Login to your Sky Baby Store account</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" name="email" id="emailInput" class="form-control" placeholder="john@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" id="passwordInput" class="form-control pe-5" required>
                        <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y border-0 text-muted" id="togglePassword" style="cursor: pointer; padding: 0.375rem 0.75rem;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">
                    Login
                </button>
            </form>

            <p class="text-center text-muted small mt-3">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a>
            </p>
        </div>

    </div>
</div>

<script>
// Password visibility toggle
document.getElementById('togglePassword').addEventListener('click', function(e) {
    e.preventDefault();
    const input = document.getElementById('passwordInput');
    const icon = this.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
});
</script>

{% endblock %}
